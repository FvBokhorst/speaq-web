<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>WAV Test</title>
<style>body{background:#000;color:#fff;font-family:sans-serif;padding:20px}button{font-size:18px;padding:15px 30px;margin:10px;border-radius:10px;border:none;color:#000;background:#D4A853}#log{white-space:pre-wrap;font-size:11px;color:#888;margin-top:20px}audio{width:100%;margin:10px 0}</style>
</head><body>
<h2>WAV Voice Test</h2>
<button id="recBtn">Record</button>
<button id="stopBtn" disabled>Stop & Play</button>
<div id="players"></div>
<div id="log"></div>
<script>
const log = m => { document.getElementById('log').textContent += m + '\n'; };
let ctx, source, processor, chunks = [], recording = false, stream;

document.getElementById('recBtn').onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    source = ctx.createMediaStreamSource(stream);
    processor = ctx.createScriptProcessor(4096, 1, 1);
    chunks = [];
    recording = true;
    
    processor.onaudioprocess = e => {
      if (!recording) return;
      const input = e.inputBuffer.getChannelData(0);
      const ratio = Math.floor(ctx.sampleRate / 16000);
      const down = new Float32Array(Math.floor(input.length / ratio));
      for (let i = 0; i < down.length; i++) down[i] = input[i * ratio];
      chunks.push(new Float32Array(down));
    };
    
    source.connect(processor);
    processor.connect(ctx.destination);
    log('Recording at ' + ctx.sampleRate + 'Hz, downsampling to 16000Hz...');
    document.getElementById('recBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
  } catch(e) { log('ERROR: ' + e.message); }
};

document.getElementById('stopBtn').onclick = () => {
  recording = false;
  processor.disconnect();
  source.disconnect();
  stream.getTracks().forEach(t => t.stop());
  ctx.close();
  
  // Combine chunks
  const total = chunks.reduce((s,c) => s + c.length, 0);
  const combined = new Float32Array(total);
  let off = 0;
  for (const c of chunks) { combined.set(c, off); off += c.length; }
  log('Samples: ' + total + ' (' + (total/16000).toFixed(1) + ' seconds)');
  
  // Encode WAV
  const buf = new ArrayBuffer(44 + combined.length * 2);
  const v = new DataView(buf);
  const w = (o,s) => { for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4,36+combined.length*2,true); w(8,'WAVE');
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,16000,true); v.setUint32(28,32000,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,'data'); v.setUint32(40,combined.length*2,true);
  for(let i=0;i<combined.length;i++){const s=Math.max(-1,Math.min(1,combined[i]));v.setInt16(44+i*2,s<0?s*0x8000:s*0x7FFF,true);}
  
  const blob = new Blob([buf], {type:'audio/wav'});
  log('WAV blob: ' + blob.size + ' bytes, type: ' + blob.type);
  
  const url = URL.createObjectURL(blob);
  const players = document.getElementById('players');
  players.innerHTML = '<p>WAV Audio Player:</p><audio controls src="'+url+'"></audio>';
  log('Blob URL created. Try the play button above.');
  
  document.getElementById('recBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
};
</script>
</body></html>
